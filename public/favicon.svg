<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark circle background -->
  <circle cx="32" cy="32" r="32" fill="#0b1120"/>

  <!-- Sun (behind cloud) -->
  <!-- Rays -->
  <g stroke="rgba(255,180,60,0.75)" stroke-width="2" stroke-linecap="round">
    <line x1="43" y1="8.5"  x2="43" y2="11.5"/>
    <line x1="49.5" y1="10.2" x2="47.5" y2="12.5"/>
    <line x1="53.5" y1="15.5" x2="51"   y2="16.8"/>
    <line x1="55.5" y1="22"  x2="52.5"  y2="22"/>
    <line x1="53.5" y1="28.5" x2="51"   y2="27.2"/>
    <line x1="36.5" y1="10.2" x2="38.5" y2="12.5"/>
  </g>
  <!-- Sun disc -->
  <radialGradient id="sg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffd27a"/>
    <stop offset="100%" stop-color="#ff8a3d"/>
  </radialGradient>
  <circle cx="43" cy="22" r="9" fill="url(#sg)"/>

  <!-- Cloud -->
  <circle cx="28" cy="34" r="11"   fill="rgba(200,215,240,0.93)"/>
  <circle cx="39" cy="36" r="8.5"  fill="rgba(200,215,240,0.93)"/>
  <circle cx="19" cy="37" r="8"    fill="rgba(200,215,240,0.93)"/>

  <!-- Rain drops -->
  <g stroke="#4fd1e8" stroke-width="2" stroke-linecap="round">
    <line x1="22" y1="48" x2="20" y2="54"/>
    <line x1="29" y1="50" x2="27" y2="56"/>
    <line x1="36" y1="47" x2="34" y2="53"/>
    <line x1="43" y1="49" x2="41" y2="55"/>
  </g>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(79,209,232,0.22)" stroke-width="1.5"/>
</svg>
